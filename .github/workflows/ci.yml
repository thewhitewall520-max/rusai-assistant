name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: writing_assistant_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        working-directory: ./src/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./src/backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./src/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/writing_assistant_test
        run: npx prisma migrate deploy

      - name: Run linter
        working-directory: ./src/backend
        run: npm run lint

      - name: Run tests
        working-directory: ./src/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/writing_assistant_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: npm run test:cov

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./src/backend/coverage

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run linter
        working-directory: ./src/frontend
        run: npm run lint

      - name: Run type check
        working-directory: ./src/frontend
        run: npm run typecheck

      - name: Run tests
        working-directory: ./src/frontend
        run: npm run test:coverage

      - name: Build
        working-directory: ./src/frontend
        run: npm run build

  build-images:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/writing-assistant-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/writing-assistant-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./infra/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/writing-assistant-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/writing-assistant-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max