name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vultr Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script_stop: false
          debug: true
          script: |
            set -e
            echo "🚀 Starting deployment..."
            
            # 检查目录
            if [ ! -d "/opt/rusai-assistant" ]; then
              mkdir -p /opt/rusai-assistant
            fi
            
            cd /opt/rusai-assistant
            
            # 初始化 git（如果 needed）
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/thewhitewall520-max/rusai-assistant.git
            fi
            
            # 拉取最新代码
            git fetch origin || true
            git reset --hard origin/main || true
            
            # 创建环境文件
            cat > .env << 'EOF'
            KIMI_API_KEY=${{ secrets.KIMI_API_KEY }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=https://rusai.cc
            EOF
            
            # 检查 docker compose
            if command -v docker-compose &> /dev/null; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi
            
            # 重启服务
            $COMPOSE_CMD down 2>/dev/null || true
            $COMPOSE_CMD up -d || true
            
            echo "✅ Deployment completed!"
            docker ps || true
