version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: writing-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-writing_assistant}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-writing_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-writing_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - writing-assistant-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: writing-assistant-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - writing-assistant-network

  # 后端 API
  backend:
    build:
      context: ../src/backend
      dockerfile: ../../infra/docker/Dockerfile.backend
    container_name: writing-assistant-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-writing_assistant}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-writing_assistant}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src/backend:/app
      - /app/node_modules
    networks:
      - writing-assistant-network

  # 前端应用
  frontend:
    build:
      context: ../src/frontend
      dockerfile: ../../infra/docker/Dockerfile.frontend
    container_name: writing-assistant-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ../src/frontend:/app
      - /app/node_modules
    networks:
      - writing-assistant-network

  # Nginx 反向代理 (生产环境)
  nginx:
    image: nginx:alpine
    container_name: writing-assistant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - writing-assistant-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  writing-assistant-network:
    driver: bridge